name: Provider Pipeline

on:
  workflow_dispatch:

jobs:
  provider:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: Install Pact CLI
        run: |
          curl -fsSL https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz | tar xz -C $HOME
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      - name: Start Pact Broker
        run: |
          docker compose -f src/test/resources/docker-compose.pact-broker.yml up -d --wait

      - name: Verify Broker
        run: |
          curl http://127.0.0.1:9292

      - name: Run Provider Verification
        run: |
          mvn clean test \
          -Dtest=provider.FoodProviderVerification \
          -Dgit.sha=${{ github.sha }}

      - name: Record Provider Deployment
        run: |
          pact-broker record-deployment \
          --pacticipant food-provider \
          --version=${{ github.sha }} \
          --environment production \
          --broker-base-url=http://127.0.0.1:9292

      - name: Can I Deploy Provider
        run: |
          pact-broker can-i-deploy \
          --pacticipant food-provider \
          --version=${{ github.sha }} \
          --to-environment production \
          --broker-base-url=http://127.0.0.1:9292