version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: pact-postgres

    environment:
      POSTGRES_USER: pact
      POSTGRES_PASSWORD: pact
      POSTGRES_DB: pact

    ports:
      - "5432:5432"

    volumes:
      - pact-broker-db:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pact -d pact"]
      interval: 5s
      timeout: 5s
      retries: 12

  broker:
    image: pactfoundation/pact-broker:2.136.0-pactbroker2.117.1
    container_name: pact-broker

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "9292:9292"

    environment:
      PACT_BROKER_PORT: "9292"
      PACT_BROKER_BASE_URL: http://localhost:9292
      PACT_BROKER_DATABASE_URL: postgres://pact:pact@postgres/pact
      PACT_BROKER_LOG_LEVEL: INFO
      PACT_BROKER_SQL_LOG_LEVEL: WARN

    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9292/diagnostic/status/heartbeat"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s

    restart: unless-stopped

volumes:
  pact-broker-db: