name: Consumer Contract

on:
  push:
  pull_request:

jobs:
  consumer-contract-test:
    name: Consumer Pact Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '22'
          cache: maven

      - name: Install Pact CLI
        run: |
          curl -fsSL https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz | tar xz -C $HOME
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      - name: Start Pact Broker
        run: |
          docker compose -f Week_4_MockAPI_Selenide_Assessment/consumer_proj/src/test/resources/docker-compose.pact-broker.yml down -v
          docker compose -f Week_4_MockAPI_Selenide_Assessment/consumer_proj/src/test/resources/docker-compose.pact-broker.yml up -d --wait

      - name: Run Consumer Pact Tests
        run: |
          mvn -Dtest=PosConsumerVerification test

      - name: Publish Consumer Contracts
        run: |
          pact-broker publish target/pacts \
            --consumer-app-version=${{ github.sha }} \
            --branch=main \
            --broker-base-url=http://127.0.0.1:9292