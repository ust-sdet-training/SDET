name: Consumer Aravind CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 00. Checkout Code
        uses: actions/checkout@v5

      - name: 0. Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '22'
          cache: 'maven'

      - name: 0. Install Pact CLI
        run: |
          curl -fsSL https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz | tar xz -C $HOME
          if [ -d "$HOME/pact" ]; then
            echo "$HOME/pact/bin" >> $GITHUB_PATH
          else
            echo "$HOME/pact-cli/bin" >> $GITHUB_PATH
          fi

      - name: 2. Run Consumer Tests
        env:
          # Injects the secret safely from GitHub Actions into the shell execution
          SECURE_TOKEN: ${{ secrets.ARAVIND_PACT_TOKEN }}
        run: |
          mvn clean test \
              -Dtest.tags=consumer \
              -Dgit.sha=${{ github.sha }} \
              -Dpactbroker.host=sdf.pactflow.io \
              -Dpactbroker.scheme=https \
              -Dpactbroker.auth.token=$SECURE_TOKEN

      - name: 3. Consumer Publish Contracts to the Broker
        run: |
          mvn au.com.dius.pact.provider:maven:publish \
            -Dgit.sha=${GITHUB_SHA::7} \
            -Dgit.branch=${GITHUB_REF_NAME}