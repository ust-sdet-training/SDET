name: Consumer Pact Pipeline

on:
  push:
    paths:
      - 'pos/**'
      - '.github/workflows/consumer.yml'
  pull_request:
    paths:
      - 'pos/**'
      - '.github/workflows/consumer.yml'

jobs:
  consumer-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run consumer Pact tests
        env:
          PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL || 'https://qwq.pactflow.io' }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN || 'DrLusdyyj6UlhPprN3cneQ' }}
        run: mvn -pl pos test

      - name: Publish Pact to PactFlow
        if: success()
        env:
          PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL || 'https://qwq.pactflow.io' }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN || 'DrLusdyyj6UlhPprN3cneQ' }}
        run: mvn -pl pos pact:publish

      - name: Can I Deploy?
        if: success()
        env:
          PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL || 'https://qwq.pactflow.io' }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN || 'DrLusdyyj6UlhPprN3cneQ' }}
        run: mvn -pl pos pact:can-i-deploy
