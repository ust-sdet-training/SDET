name: Consumer

on: [push, pull_request]

jobs:
  build:
    environment: Pact
    runs-on: ubuntu-latest

    steps:
      - name: 0. Checkout Code
        uses: actions/checkout@v5

      - name: 0. Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '22'
          cache: 'maven'

      - name: 1. Install Pact CLI
        run: |
          curl -fsSL https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz | tar xz -C $HOME
          echo "$HOME/pact/bin" >> $GITHUB_PATH


      - name: 2. Run Consumer Tests & Publish Contracts
        working-directory: week4consumer
        run: |
          mvn -Dtest=PactCreated test
      
      - name: 3. Consumer Publish Contracts to the Borker
        working-directory: week4consumer
        run: |
          pact-broker publish target/pacts \
            --consumer-app-version=${{ github.sha }} \
            --branch=main \
            --broker-base-url=https://ali-3e5f8672.pactflow.io \
            --broker-token=26XPxC824gIJ8ttYfZeHGQ

      
      