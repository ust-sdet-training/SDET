name: Consumer Contract

on:
  push:
    branches:
      - kavya_week4_gate4
  workflow_dispatch:

jobs:
  consumer:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pact/pact

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Pact
        uses: actions/download-artifact@v4
        with:
          name: pact-files
          path: target/pacts

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 22
          cache: maven

      - name: Install Pact CLI
        run: |
          curl -fsSL https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz | tar xz -C $HOME
          echo "$HOME/pact/bin" >> $GITHUB_PATH


      - name: Run Consumer Tests
        run: |
          mvn clean test -Dtest=PosOmsConsumerPactTest

      - name: Publish Pact
        run: |
          pact-broker publish target/pacts \
            --consumer-app-version=${{ github.sha }} \
            --branch=main \
            --broker-base-url=http://127.0.0.1:9292