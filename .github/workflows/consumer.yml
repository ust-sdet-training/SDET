name: Consumer Contract

on:
  push:
    branches:
      - bhumika-week04-gate4

jobs:
  consumer:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 22

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run Consumer Test
        working-directory: selenide-wiremock-gate4-bhumika
        run: mvn clean test -Dtest=ConsumerTest

      - name: Publish Pact
        working-directory: selenide-wiremock-gate4-bhumika
        run: |
          mvn au.com.dius.pact.provider:maven:4.6.20:publish \
            -Dpact.broker.url=https://jjjj-73df0332.pactflow.io \
            -Dpact.broker.token=Mxt5U4qwYAmkJRK0hNY3wQ \
            -Dgit.sha=${GITHUB_SHA::7} \
            -Dgit.branch=${GITHUB_REF_NAME}
