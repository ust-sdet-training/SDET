name: Consumer Contract Test

on:
  push:
    branches:
      - saiteja_week04-gate4

jobs:
  consumer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('Consumer_Provider/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}

      - name: Verify Java
        run: java -version

      - name: Verify Maven
        working-directory: Consumer_Provider
        run: mvn -version

      - name: Run Consumer Tests
        working-directory: Consumer_Provider
        run: mvn -Dtest=PosOmsConsumerPactTest test

      - name: Show Generated Pact Files
        working-directory: Consumer_Provider
        run: |
          ls -R target

      - name: Publish Pact to Broker
        working-directory: Consumer_Provider
        run: |
          mvn au.com.dius.pact.provider:maven:publish \
            -Dgit.sha=${GITHUB_SHA::7} \
            -Dgit.branch=${GITHUB_REF_NAME}