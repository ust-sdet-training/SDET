name: Consumer Contract

on:
  push:
    branches:
      - newjyothsna-week4-gate4
  workflow_dispatch:

jobs:
  consumer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Debug
        run: |
          pwd
          ls
          ls Week4Assessment

      - name: Run Consumer
        working-directory: Week4Assessment
        run: mvn clean test -pl consumer-storefront