name: Consumer Pipeline

on:
  push:

jobs:
  consumer:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - run: mvn -pl consumer test
        working-directory: benchmark4

      - run: gem install pact_broker-client

      - run: |
          pact-broker publish benchmark4/consumer/target/pacts \
          --consumer-app-version $GITHUB_SHA

      - run: |
          pact-broker can-i-deploy \
          --participant storefront-web \
          --version $GITHUB_SHA