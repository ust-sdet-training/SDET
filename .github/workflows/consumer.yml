name: Consumer Pact CI

on:
  push:
    branches:
      - shahbaz_week04_gate4
  pull_request:
    branches:
      - shahbaz_week04_gate4

jobs:
  consumer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: Install Pact CLI
        run: |
          curl -fsSL https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz | tar xz -C $HOME
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      - name: Run Consumer Pact Tests
        working-directory: ./PactWithWireMock
        run: mvn -Dtest=PosOmsConsumerPactTest test

      - name: Publish Consumer Pacts
        working-directory: ./PactWithWireMock
        run: |
          pact-broker publish target/pacts \
            --consumer-app-version=${{ github.sha }} \
            --branch=${{ github.ref_name }} \
            --broker-base-url=${{ secrets.SHAHBAZ_PACT_BROKER_BASE_URL }} \
            --broker-token=${{ secrets.SHAHBAZ_PACT_BROKER_TOKEN }}

      - name: Record Consumer Deployment
        run: |
          pact-broker record-deployment \
            --pacticipant pos-consumer \
            --version=${{ github.sha }} \
            --environment=production \
            --broker-base-url=${{ secrets.SHAHBAZ_PACT_BROKER_BASE_URL }} \
            --broker-token=${{ secrets.SHAHBAZ_PACT_BROKER_TOKEN }}