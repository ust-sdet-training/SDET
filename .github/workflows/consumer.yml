name: Pact Consumer

on:
  push:
    branches:
      - lahari_week4_gate4
  pull_request:
    branches:
      - lahari_week4_gate4

jobs:
  consumer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22
          cache: maven

      - name: Install Pact CLI
        run: |
          curl -fsSL https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz | tar xz -C $HOME
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      - name: Start Pact Broker
        run: |
          docker compose -f Week4_Gate4/ProviderConsumerPact/src/test/resources/docker-compose.pact-broker.yml up -d --wait

      - name: Run Consumer Pact Tests
        working-directory: Week4_Gate4/ProviderConsumerPact
        run: mvn clean test -Dtest=PosOmsConsumerPactTest

      - name: Upload Pact Files
        uses: actions/upload-artifact@v4
        with:
          name: pact-files
          path: Week4_Gate4/ProviderConsumerPact/target/pacts

      - name: Publish Contracts to Pact Broker
        working-directory: Week4_Gate4/ProviderConsumerPact
        run: |
          pact-broker publish target/pacts \
            --consumer-app-version=${{ github.sha }} \
            --branch=lahari_week4_gate4 \
            --broker-base-url=http://127.0.0.1:9292

      - name: Record Consumer Deployment
        working-directory: Week4_Gate4/ProviderConsumerPact
        run: |
          pact-broker record-deployment \
            --pacticipant pos-consumer \
            --version=${{ github.sha }} \
            --environment production \
            --broker-base-url=http://127.0.0.1:9292

      - name: Can I Deploy
        working-directory: Week4_Gate4/ProviderConsumerPact
        run: |
          pact-broker can-i-deploy \
            --pacticipant pos-consumer \
            --version=${{ github.sha }} \
            --to-environment production \
            --broker-base-url=http://127.0.0.1:9292