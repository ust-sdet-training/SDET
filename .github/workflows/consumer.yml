name: Pact Consumer

on:
  push:
    branches:
      - ajay_week04_gate04
  pull_request:
    branches:
      - ajay_week04_gate04

jobs:
  consumer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22
          cache: maven

      - name: Install Pact CLI
        run: |
          curl -fsSL https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz | tar xz -C $HOME
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      - name: Start Pact Broker
        run: |
          docker compose -f Pact-week4-gate4/src/test/resources/docker-compose.pact-broker.yml up -d --wait

      - name: Run Consumer Pact Tests
        working-directory: Pact-week4-gate4
        run: mvn clean test -Dtest=PosOmsConsumerPactTest

      - name: Upload Pact Files
        uses: actions/upload-artifact@v4
        with:
          name: pact-files
          path: Pact-week4-gate4/target/pacts