name: Consumer Aravind CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 00. Checkout Code
        uses: actions/checkout@v5

      - name: 0. Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '22'
          cache: 'maven'

      - name: 0. Install Pact CLI
        run: |
          curl -fsSL https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz | tar xz -C $HOME
          # Correct extraction path handling for standard pact package structures
          if [ -d "$HOME/pact" ]; then
            echo "$HOME/pact/bin" >> $GITHUB_PATH
          else
            echo "$HOME/pact-cli/bin" >> $GITHUB_PATH
          fi

      - name: 1. Start Pact Broker (Shared/Local Instance)
        run: |
          docker compose -f src/test/resources/docker-compose.pact-broker.yml down -v
          docker compose -f src/test/resources/docker-compose.pact-broker.yml up -d --wait

      - name: 2. Run Consumer Tests
        run: |
          mvn test -Dtest.tags=consumer

      - name: 3. Consumer Publish Contracts to the Broker
        run: |
          pact-broker publish target/pacts \
            --consumer-app-version=${{ github.sha }} \
            --branch=main \
            --broker-base-url=http://127.0.0.1:9292