name: Consumer Pipeline

on:
  push:
  pull_request:

jobs:
  consumer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run Consumer Tests
        working-directory: benchmark4
        run: |
          mvn -pl consumer clean test

      - name: Verify Pact File Exists
        working-directory: benchmark4
        run: |
          ls -R consumer/target || true
          find . -name "*.json"