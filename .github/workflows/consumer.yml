name: storefront-web

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  consumer-contract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: jamesy_week4_gate4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: Start Pact Broker
        run: |
          docker compose -f resources/docker-compose.pact-broker.yml down -v
          docker compose -f resources/docker-compose.pact-broker.yml up -d --wait

      - name: Run Consumer Pact Tests
        run: |
          mvn -pl storefront-web -am clean test -Dtest=CatalogConsumerPactTest

      - name: Publish Pact To Broker
        run: |
          pact-broker publish storefront-web/target/pacts \
            --consumer-app-version=${{ github.sha }} \
            --branch=main \
            --broker-base-url=http://127.0.0.1:9292

      - name: Can I Deploy Consumer
        run: |
          pact-broker can-i-deploy \
            --pacticipant storefront-web \
            --version ${{ github.sha }} \
            --broker-base-url=http://127.0.0.1:9292