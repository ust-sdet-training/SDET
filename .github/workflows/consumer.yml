name: Consumer Pipeline

on:
  push:
  pull_request:

jobs:
  consumer:
    runs-on: ubuntu-latest
    env:
      PACT_BROKER_URL: ${{ secrets.PACT_BROKER_URL }}
      PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Install Pact CLI
        run: |
          curl -fsSL https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz | tar xz -C "$HOME"
          echo "$HOME/pact/bin" >> "$GITHUB_PATH"

      - name: Run Consumer Tests
        run: |
          cd week4_assessment_pactflow
          mvn -pl consumer test

      - name: Validate Pact Broker secrets
        run: |
          if [ -z "$PACT_BROKER_URL" ] || [ -z "$PACT_BROKER_TOKEN" ]; then
            echo "⚠️  Pact Broker secrets not configured. Skipping broker operations."
            exit 0
          fi

      - name: Publish Contracts to PactFlow
        if: env.PACT_BROKER_URL != '' && env.PACT_BROKER_TOKEN != ''
        run: |
          echo "Looking for pacts in: $(pwd)/week4_assessment_pactflow/consumer/target/pacts"
          if [ -d "week4_assessment_pactflow/consumer/target/pacts" ]; then
            ls -la week4_assessment_pactflow/consumer/target/pacts
            pact-broker publish "week4_assessment_pactflow/consumer/target/pacts" \
              --consumer-app-version="$GITHUB_SHA" \
              --branch=main \
              --broker-base-url="$PACT_BROKER_URL" \
              --broker-token="$PACT_BROKER_TOKEN" || echo "Publish failed, but continuing..."
          else
            echo "⚠️  Pacts directory not found at week4_assessment_pactflow/consumer/target/pacts"
            find week4_assessment_pactflow -name "*.json" -type f 2>/dev/null | head -10 || echo "No JSON files found"
          fi

      - name: Can I Deploy (Consumer)
        if: env.PACT_BROKER_URL != '' && env.PACT_BROKER_TOKEN != ''
        run: |
          pact-broker can-i-deploy \
            --pacticipant storefront-web \
            --version="$GITHUB_SHA" \
            --to-environment production \
            --broker-base-url="$PACT_BROKER_URL" \
            --broker-token="$PACT_BROKER_TOKEN"