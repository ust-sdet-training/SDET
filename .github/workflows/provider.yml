name: catalog-service

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  provider-verification:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          ref: jamesy_week4_gate4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: Install Pact CLI
        run: |
          curl -fsSL https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz | tar xz -C $HOME
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      - name: Start Pact Broker
#        working-directory: catalog-service
        run: |
          docker compose -f resources/docker-compose.pact-broker.yml down -v
          docker compose -f resources/docker-compose.pact-broker.yml up -d --wait

      - name: Run Provider Verification
#        working-directory: catalog-service
        run: |
          mvn \
          -Dtest=CatalogProviderVerificationTest \
          -Dpact.verifier.publishResults=true \
          test

      - name: Record Provider Deployment
#        working-directory: catalog-service
        run: |
          pact-broker record-deployment \
            --pacticipant catalog-service \
            --version ${{ github.sha }} \
            --environment production \
            --broker-base-url=http://127.0.0.1:9292

      - name: Can I Deploy Provider
#        working-directory: catalog-service
        run: |
          pact-broker can-i-deploy \
            --pacticipant catalog-service \
            --version ${{ github.sha }} \
            --to-environment production \
            --broker-base-url=http://127.0.0.1:9292