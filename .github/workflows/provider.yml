name: Provider Pipeline

on:
  push:

jobs:
  provider:

    runs-on: ubuntu-latest
    env:
      PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
      PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
      PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - run: mvn -pl consumer test
        working-directory: benchmark4

      - run: mvn -pl provider test
        working-directory: benchmark4

      - run: gem install pact_broker-client

      - name: Validate Pact Broker secrets
        run: |
          if [ -z "$PACT_BROKER_BASE_URL" ] || [ -z "$PACT_BROKER_USERNAME" ] || [ -z "$PACT_BROKER_PASSWORD" ]; then
            echo "Missing Pact Broker secrets. Add PACT_BROKER_BASE_URL, PACT_BROKER_USERNAME, and PACT_BROKER_PASSWORD in GitHub repository secrets."
            exit 1
          fi

      - run: |
          pact-broker can-i-deploy \
          --pacticipant catalog-service \
          --version "$GITHUB_SHA" \
          --broker-base-url "$PACT_BROKER_BASE_URL" \
          --broker-username "$PACT_BROKER_USERNAME" \
          --broker-password "$PACT_BROKER_PASSWORD"