name: Provider Pipeline

on:
  push:
    branches:
      - rishika-week04-gate4

jobs:
  provider-verification:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"
          cache: maven

      - name: Debug workspace
        run: |
          pwd
          ls -R

      - name: Install Pact CLI
        run: |
          curl -fsSL https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz | tar xz -C $HOME
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      - name: Start Pact Broker
        run: |
          docker compose -f rishika-week04-gate4/src/test/resources/docker-compose.pact-broker.yml down -v || true
          docker compose -f rishika-week04-gate4/src/test/resources/docker-compose.pact-broker.yml up -d --wait


      - name: Wait for Pact Broker
        run: |
          echo "Waiting for Pact Broker..."
          for i in {1..20}; do
            curl -s http://localhost:9292/diagnostic/status/heartbeat && break
            echo "Waiting..."
            sleep 5
          done


      - name: Verify Broker
        run: |
          curl -v http://localhost:9292/diagnostic/status/heartbeat


      - name: Run Provider Verification Tests
        working-directory: rishika-week04-gate4
        run: |
          mvn clean test -Dtest=OmsProviderVerification \
            -Dpact.verifier.publishResults=true \
            -Dpact.provider.version=${{ github.sha }} \
            -Dpact.provider.branch=rishika-week04-gate4


      - name: Show Surefire Reports (on failure)
        if: failure()
        run: |
          ls -R target/surefire-reports || true
          cat target/surefire-reports/*.txt || true


      - name: Record Provider Deployment
        run: |
          pact-broker record-deployment \
            --pacticipant oms-provider \
            --version=${{ github.sha }} \
            --environment production \
            --broker-base-url=http://localhost:9292


      - name: Can I Deploy
        run: |
          pact-broker can-i-deploy \
            --pacticipant oms-provider \
            --version=${{ github.sha }} \
            --to-environment production \
            --broker-base-url=http://localhost:9292


      - name: Stop Pact Broker
        if: always()
        run: |
          docker compose -f rishika-week04-gate4/src/test/resources/docker-compose.pact-broker.yml down -v