name: Provider Pact CI

on:
  push:
    branches:
      - shahbaz_week04_gate4

jobs:
  provider:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}

      - name: Verify Java
        run: java -version

      - name: Verify Maven
        working-directory: PactWithWireMock
        run: mvn -version

      - name: Run Provider Verification
        working-directory: PactWithWireMock
        run: |
          mvn \
            -Dtest=OmsProviderVerification \
            -Dpact.broker.url=${{ secrets.SHAHBAZ_PACT_BROKER_BASE_URL }} \
            -Dpact.broker.token=${{ secrets.SHAHBAZ_PACT_BROKER_TOKEN }} \
            -Dpact.verifier.publishResults=true \
            -Dpact.provider.version=${GITHUB_SHA::7} \
            -Dpact.provider.branch=${GITHUB_REF_NAME} \
            test