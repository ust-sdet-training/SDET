name: Provider Verification
#
on:
  push:
    branches:
      - premchand-week04-gate4

jobs:
  provider:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}

      - name: Verify Java
        run: java -version

      - name: Verify Maven
        run: mvn -version

      - name: Run Provider Verification
        run: |
          mvn \
            -Dtest=CatalogServiceProviderTest \
            -Dpactbroker.url=https://usta.pactflow.io \
            -Dpactbroker.auth.token=gywhJeyrwNnWZ-xHgMnT7g \
            -Dgit.sha=${GITHUB_SHA::7} \
            -Dgit.branch=${GITHUB_REF_NAME} \
            test