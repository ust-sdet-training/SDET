name: Provider Pact Pipeline

on:
  push:
    paths:
      - 'sat-assesment2706/oms/**'
      - '.github/workflows/provider.yml'
  pull_request:
    paths:
      - 'sat-assesment2706/oms/**'
      - '.github/workflows/provider.yml'

jobs:
  provider-verification:
    environment: Pact
    runs-on: ubuntu-latest

    steps:
      - name: 0. Checkout Code
        uses: actions/checkout@v4

      - name: 0. Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: 1. Install Pact CLI
        run: |
          curl -fsSL https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz | tar xz -C $HOME
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      - name: 2. Show Repository Structure
        run: |
          pwd
          ls -la
          find . -maxdepth 4 -type f -name "pom.xml"

      - name: 3. Verify Provider Against Pact Broker
        run: |
          mvn -f sat-assesment2706/pom.xml -pl oms test \
            -Dpact.provider.version=${{ github.sha }} \
            -Dpact.provider.branch=main \
            -Dpact.verifier.publishResults=true \
            -Dpactbroker.url=https://qwq.pactflow.io \
            -Dpactbroker.auth.token=DrLusdyyj6UlhPprN3cneQ

      - name: 4. Create Provider Version in Broker
        if: success()
        run: |
          curl -X PUT https://qwq.pactflow.io/pacticipants/oms/versions/${{ github.sha }} \
            -H "Authorization: Bearer DrLusdyyj6UlhPprN3cneQ" \
            -H "Content-Type: application/json" \
            -d '{"branch": "main"}'

      - name: 5. Record Deployment to Production
        if: success()
        run: |
          pact-broker record-deployment \
            --pacticipant=oms \
            --version=${{ github.sha }} \
            --environment=production \
            --broker-base-url=https://qwq.pactflow.io \
            --broker-token=DrLusdyyj6UlhPprN3cneQ

      - name: 6. Can I Deploy
        if: success()
        run: |
          pact-broker can-i-deploy \
            --pacticipant=oms \
            --version=${{ github.sha }} \
            --to-environment=production \
            --broker-base-url=https://qwq.pactflow.io \
            --broker-token=DrLusdyyj6UlhPprN3cneQ