name: Provider Aravind CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 00. Checkout Code
        uses: actions/checkout@v5

      - name: 0. Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '22'
          cache: 'maven'

      - name: 0. Install Pact CLI
        run: |
          curl -fsSL https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz | tar xz -C $HOME
          if [ -d "$HOME/pact" ]; then
            echo "$HOME/pact/bin" >> $GITHUB_PATH
          else
            echo "$HOME/pact-cli/bin" >> $GITHUB_PATH
          fi

      # NOTE: If this is a separate pipeline execution on standard GitHub Actions,
      # a local 127.0.0.1 broker container will be completely empty unless
      # you are running everything inside a single monorepo orchestration step.

      - name: 2. Run Provider Verification
              env:
          SECURE_TOKEN: ${{ secrets.ARAVIND_PACT_TOKEN }}
        run: |
          mvn -Dtest=OmsProviderVerificationTest \
              -Dgit.sha=${{ github.sha }} \
              -Dpactbroker.host=https://sdf.pactflow.io \ 
              -Dgit.sha=${{ github.sha }} \
              -Dpact.broker.url=$SECURE_URL \
              -Dpact.broker.token=$SECURE_TOKEN \
              test

      - name: 3. Can I Deploy (Gatekeeper)
        env:
          CONTRACT_VERSION: ${{ github.sha }}
        run: |
          pact-broker can-i-deploy \
            --pacticipant oms-provider \
            --version $CONTRACT_VERSION \
            --to-environment production \
            --broker-base-url 

      - name: 4. Record provider deployment to production
        if: success()
        run: |
          pact-broker record-deployment \
            --pacticipant oms-provider \
            --version ${{ github.sha }} \
            --environment production \
            --broker-base-url=${{ARAVIND_PACT_BROKER_URL}}\
            --broker-token=${{ARAVIND_PACT_TOKEN}}