name: Provider Pipeline

on:
  push:
  pull_request:

jobs:
  provider:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22
          cache: maven

      - name: Run Consumer Tests
        working-directory: week4_assessment_pactflow
        run: mvn -pl consumer clean test

      - name: Run Provider Verification
        working-directory: week4_assessment_pactflow
        run: mvn -pl provider clean test