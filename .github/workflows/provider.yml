name: Provider Pipeline

on:
  push:

jobs:
  provider:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - run: mvn -pl consumer test
        working-directory: benchmark4

      - run: mvn -pl provider test
        working-directory: benchmark4

      - run: gem install pact_broker-client

      - run: |
          pact-broker can-i-deploy \
          --participant catalog-service \
          --version $GITHUB_SHA