name: Provider Aravind CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 00. Checkout Code
        uses: actions/checkout@v5

      - name: 0. Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '22'
          cache: 'maven'

      - name: 0. Install Pact CLI
        run: |
          curl -fsSL https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz | tar xz -C $HOME
          if [ -d "$HOME/pact" ]; then
            echo "$HOME/pact/bin" >> $GITHUB_PATH
          else
            echo "$HOME/pact-cli/bin" >> $GITHUB_PATH
          fi

      - name: 2. Run Provider Verification
        env:
          # Fixed Indentation here!
          SECURE_TOKEN: ${{ secrets.ARAVIND_PACT_TOKEN }}
        run: |
          mvn test \
              -Dtest=OmsProviderVerificationTest \
              -Dgit.sha=${{ github.sha }} \
              -Dpactbroker.host=sdf.pactflow.io \
              -Dpactbroker.scheme=https \
              -Dpactbroker.auth.token=$SECURE_TOKEN

      - name: 3. Can I Deploy (Gatekeeper)
        run: |
          pact-broker can-i-deploy \
            --pacticipant oms-provider \
            --version ${{ github.sha }} \
            --to-environment production \
            --broker-base-url=https://sdf.pactflow.io \
            --broker-token=${{ secrets.ARAVIND_PACT_TOKEN }}

      - name: 4. Record provider deployment to production
        if: success()
        run: |
          pact-broker record-deployment \
            --pacticipant oms-provider \
            --version ${{ github.sha }} \
            --environment production \
            --broker-base-url=https://sdf.pactflow.io \
            --broker-token=${{ secrets.ARAVIND_PACT_TOKEN }}