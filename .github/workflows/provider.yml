name: Provider CI

on:
  push:
    paths:
      - "Week04_PactsAndSelenide/posConsumerProj/**"
      - "Week04_PactsAndSelenide/omsProviderProj/**"
      - ".github/workflows/provider.yml"
  pull_request:
    paths:
      - "Week04_PactsAndSelenide/posConsumerProj/**"
      - "Week04_PactsAndSelenide/omsProviderProj/**"
      - ".github/workflows/provider.yml"

jobs:
  provider:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Week04_PactsAndSelenide

    steps:
      - name: 00. Checkout Code
        uses: actions/checkout@v5

      - name: 01. Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "22"
          cache: maven

      - name: 02. Install Pact CLI
        run: |
          curl -fsSL https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz | tar xz -C $HOME
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      - name: 03. Start Pact Broker
        run: |
          docker compose -f posConsumerProj/src/test/resources/docker-compose.pact-broker.yml down -v
          docker compose -f posConsumerProj/src/test/resources/docker-compose.pact-broker.yml up -d --wait

      - name: 04. Generate Consumer Pact
        run: |
          mvn -pl posConsumerProj -Dtest=PosConsumerPactTest test

      - name: 05. Publish Contracts to Broker
        run: |
          pact-broker publish target/pacts \
            --consumer-app-version=${{ github.sha }} \
            --branch=main \
            --broker-base-url=http://127.0.0.1:9292

      - name: 06. Run Provider Verification
        run: |
          mvn -pl omsProviderProj \
            -Dtest=OmsProviderVerificationTest \
            -Dgit.sha=${{ github.sha }} \
            -Dpact.provider.branch=main \
            test

      - name: 07. Record Provider Deployment
        run: |
          pact-broker record-deployment \
            --pacticipant oms-provider \
            --version ${{ github.sha }} \
            --environment production \
            --broker-base-url http://127.0.0.1:9292

      - name: 08. Can I Deploy
        env:
          CONTRACT_VERSION: ${{ github.sha }}
        run: |
          pact-broker can-i-deploy \
            --pacticipant pos-consumer \
            --version $CONTRACT_VERSION \
            --to-environment production \
            --broker-base-url http://127.0.0.1:9292
