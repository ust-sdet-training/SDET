name: Pact Provider

on:
  push:
    branches:
      - lahari_week4_gate4
  pull_request:
    branches:
      - lahari_week4_gate4

jobs:
  provider:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: Install Pact CLI
        run: |
          curl -fsSL https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz | tar xz -C $HOME
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      - name: Start Pact Broker
        run: |
          docker compose -f Week4_Gate4/ProviderConsumerPact/src/test/resources/docker-compose.pact-broker.yml up -d --wait

      - name: Run Provider Verification
        working-directory: Week4_Gate4/ProviderConsumerPact
        run: mvn clean test -Dtest=OmsProviderPactTest

      - name: Stop Pact Broker
        if: always()
        run: |
          docker compose -f Week4_Gate4/ProviderConsumerPact/src/test/resources/docker-compose.pact-broker.yml down