name: Provider Pipeline

on:
  workflow_dispatch:

jobs:
  provider:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: Install Pact CLI
        run: |
          curl -fsSL https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz | tar xz -C $HOME
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      - name: Start Pact Broker
        working-directory: rishika-week04-gate4
        run: |
          docker compose -f rishika-week04-gate4/src/test/resources/docker-compose.pact-broker.yml down -v || true
          docker compose -f rishika-week04-gate4/src/test/resources/docker-compose.pact-broker.yml up -d --wait

      - name: Verify Broker
        run: |
          curl --retry 10 \
               --retry-delay 5 \
               --retry-connrefused \
               http://127.0.0.1:9292/diagnostic/status/heartbeat

      - name: Run Provider Verification
        run: |
          mvn test \
            -Dtest=OmsProviderVerification \
            -Dpact.verifier.publishResults=true \
            -Dpact.provider.version=${{ github.sha }} \
            -Dpact.provider.branch=main

      - name: Record Provider Deployment
        run: |
          pact-broker record-deployment \
            --pacticipant oms-provider \
            --version=${{ github.sha }} \
            --environment production \
            --broker-base-url=http://127.0.0.1:9292

      - name: Can I Deploy
        run: |
          pact-broker can-i-deploy \
            --pacticipant pos-consumer \
            --version=${{ github.sha }} \
            --to-environment production \
            --broker-base-url=http://127.0.0.1:9292

      - name: Stop Broker
        if: always()
        run: |
          docker compose -f rishika-week04-gate4/src/test/resources/docker-compose.pact-broker.yml down -v