name: Provider Pact Pipeline

on:
  push:
    paths:
      - 'oms/**'
      - '.github/workflows/provider.yml'
  pull_request:
    paths:
      - 'oms/**'
      - '.github/workflows/provider.yml'

jobs:
  provider-verification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Fetch Pact from PactFlow
        env:
          PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL || 'https://qwq.pactflow.io' }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN || 'DrLusdyyj6UlhPprN3cneQ' }}
        run: mvn -pl oms pact:fetch

      - name: Verify provider
        env:
          PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL || 'https://qwq.pactflow.io' }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN || 'DrLusdyyj6UlhPprN3cneQ' }}
        run: mvn -pl oms test

      - name: Publish verification results
        if: success()
        env:
          PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL || 'https://qwq.pactflow.io' }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN || 'DrLusdyyj6UlhPprN3cneQ' }}
        run: mvn -pl oms pact:verify

      - name: Can I Deploy?
        if: success()
        env:
          PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL || 'https://qwq.pactflow.io' }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN || 'DrLusdyyj6UlhPprN3cneQ' }}
        run: mvn -pl oms pact:can-i-deploy
