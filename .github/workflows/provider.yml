name: Provider Verification
#
on:
  push:
    branches:
      - premchand-week04-gate4

jobs:
  provider:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}

      - name: Verify Java
        run: java -version

      - name: Verify Maven
        working-directory: APIGate4
        run: mvn -version

      - name: Run Provider Verification
        working-directory: APIGate4
        run: |
          mvn \
            -Dtest=CatalogServiceProviderTest \
            -Dpactbroker.url=https://usta.pactflow.io \
            -Dpactbroker.auth.token=gywhJeyrwNnWZ-xHgMnT7g \
            -Dpact.verifier.publishResults=true \
            -Dgit.sha=${GITHUB_SHA::7} \
            -Dgit.branch=${GITHUB_REF_NAME} \
            test

      - name: Can I Deploy
        working-directory: APIGate4
        if: success()
        env:
            PACT_BROKER_BASE_URL: ${{ secrets.PREM_PACT_BROKER_BASE_URL }}
            PACT_BROKER_TOKEN: ${{ secrets.PREM_PACT_BROKER_TOKEN }}
        run: |
            mvn au.com.dius.pact.provider:maven:can-i-deploy \
              -Dpact.broker.url="${PACT_BROKER_BASE_URL}" \
              -Dpact.broker.token="${PACT_BROKER_TOKEN}" \
              -Dpacticipant=catalog-provider \
              -DpacticipantVersion=${GITHUB_SHA::7}

      - name: Install Pact Broker CLI
        run: gem install pact_broker-client

      - name: Record Provider Deployment to Production
        if: success()
        env:
                PACT_BROKER_BASE_URL: ${{ secrets.PREM_PACT_BROKER_BASE_URL }}
                PACT_BROKER_TOKEN: ${{ secrets.PREM_PACT_BROKER_TOKEN }}
        run: |
                pact-broker record-deployment \
                  --broker-base-url="${PACT_BROKER_BASE_URL}" \
                  --broker-token="${PACT_BROKER_TOKEN}" \
                  --pacticipant=catalog-provider \
                  --version=${GITHUB_SHA::7} \
                  --environment=production