name: Provider Contract

on:
  push:
    branches:
      - newjyothsna-week4-gate4
  workflow_dispatch:

jobs:
  provider:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run Provider Verification
        run: mvn clean test -pl provider-catalog