name: Provider CI

on:
  push:
    branches: [ "ManiPrasad-week04-gate4" ]
  pull_request:
    branches: [ "main" ]

  repository_dispatch:
    types:
      - contract_requiring_verification

env:

  PACT_BROKER_URL: "https://hgh-46255aa4.pactflow.io"
  PACT_BROKER_TOKEN: "7ogUhMOhkXRQiFPRi3JpYg"
  PROVIDER_VERSION: ${{ github.sha }}

jobs:
  provider-build:
    runs-on: ubuntu-latest

    steps:
      - name: 00. Checkout Code
        uses: actions/checkout@v4

      - name: 0. Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '22'
          cache: 'maven'

      - name: 0. Install Pact CLI
        run: |
          curl -fsSL https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz | tar xz -C $HOME
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      - name: Run Provider Verification
        run: |
          mvn -Dtest=OmsProviderVerification \
              -Dgit.sha=$PROVIDER_VERSION \
              -Dpactbroker.host=$PACT_BROKER_URL \
              -Dpactbroker.token=$PACT_BROKER_TOKEN \
              test

      - name: Can I Deploy (Provider)

        run: |
          pact-broker can-i-deploy \
            --pacticipant oms-provider \
            --version $PROVIDER_VERSION \
            --to-environment production \
            --broker-base-url $PACT_BROKER_URL \
            --broker-token $PACT_BROKER_TOKEN

      - name: Record Provider Deployment to Production

#        if: github.ref == 'refs/heads/main'
        run: |
          pact-broker record-deployment \
            --pacticipant oms-provider \
            --version $PROVIDER_VERSION \
            --environment production \
            --broker-base-url $PACT_BROKER_URL \
            --broker-token $PACT_BROKER_TOKEN