name: Consumer CI

on:
  push:
    branches: [ "ManiPrasad-week04-gate4" ]

  pull_request:
    branches: [ "main" ]

env:
  PACT_BROKER_URL: "https://hgh-46255aa4.pactflow.io"
  PACT_BROKER_TOKEN: "7ogUhMOhkXRQiFPRi3JpYg"
  CONSUMER_VERSION: ${{ github.sha }}

jobs:
  consumer-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '22'
          cache: 'maven'

      - name: Install Pact CLI
        run: |
          curl -fsSL https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz | tar xz -C $HOME
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      - name: Run Consumer Tests & Generate Contracts
        run: mvn -Dtest=PosOmsConsumerPactTest test

      - name: Publish Contracts to the Broker
        run: |
          pact-broker publish target/pacts \
            --consumer-app-version=$CONSUMER_VERSION \
            --branch=${{ github.ref_name }} \
            --broker-base-url=$PACT_BROKER_URL \
            --broker-token=$PACT_BROKER_TOKEN

      - name: Can I Deploy (Consumer)

        run: |
          pact-broker can-i-deploy \
            --pacticipant pos-consumer \
            --version $CONSUMER_VERSION \
            --to-environment production \
            --broker-base-url $PACT_BROKER_URL \
            --broker-token $PACT_BROKER_TOKEN