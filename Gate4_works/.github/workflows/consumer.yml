name: Pact Consumer CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 00. Checkout Code
        uses: actions/checkout@v5

      - name: 0. Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '22'
          cache: 'maven'

      - name: 1. Run Consumer Pact Tests
        working-directory: PactContracts_UI_Regression
        run: |
          mvn test -Dtest=StoreFrontWebPactTest,StoreFrontWebNegativePactTest
