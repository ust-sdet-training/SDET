name: catalog-service
 
on: [push, pull_request]

jobs:
  provider-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '22'
          cache: maven
      - name: Install Pact CLI
        run: |
          curl -fsSL https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz | tar xz -C $HOME
          echo "$HOME/pact/bin" >> $GITHUB_PATH
      - name: Start Pact Broker
        run: |
          docker compose -f PactContracts_UI_Regression\src\test\resources\docker\docker-compose-pact-broker.yml down -v
          docker compose -f PactContracts_UI_Regression\src\test\resources\docker\docker-compose-pact-broker.yml up -d --wait
      - name: Run Provider Verification
        run: |
          mvn \
          -Dtest=catalogServiceVerification \
          -Dpact.verifier.publishResults=true \
          test
      - name: Record Provider Deployment
        run: |
          pact-broker record-deployment \
            --pacticipant catalog-service \
            --version ${{ github.sha }} \
            --environment production \
            --broker-base-url=http://127.0.0.1:9292
      - name: Can I Deploy Provider
        run: |
          pact-broker can-i-deploy \
            --pacticipant catalog-service \
            --version ${{ github.sha }} \
            --to-environment production \
            --broker-base-url=http://127.0.0.1:9292
 

 
